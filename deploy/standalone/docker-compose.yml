version: "3.9"

x-common-env: &common-env
  TRANSPORT_MODE: redis
  MONGO_URI: mongodb://mongodb:27017
  MONGO_DB_NAME: netfleet
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_DB: 0
  LOG_LEVEL: INFO

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: netfleet
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.7.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Pipeline Components ─────────────────────────────────────────────────────

  inventory:
    build:
      context: ../..
      dockerfile: components/inventory/Dockerfile
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      INVENTORY_MODE: cron
      DELTA_THRESHOLD_PERCENTAGE: 10
      SECONDARY_FILES_PATH: /data/inventory/files
    restart: unless-stopped

  orchestrator:
    build:
      context: ../..
      dockerfile: components/orchestrator/Dockerfile
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      JOB_CHECK_INTERVAL: 30
      QUEUE_POLL_INTERVAL: 5
      JOB_TIMEOUT_MINUTES: 120
    restart: unless-stopped

  interim:
    build:
      context: ../..
      dockerfile: components/interim/Dockerfile
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
    restart: unless-stopped

  collector:
    build:
      context: ../..
      dockerfile: components/collector/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      THREAD_POOL_SIZE: 150
      ERROR_THRESHOLD: 100
      DEVICE_TIMEOUT: 30
      AUTH_RETRY_COUNT: 2
    restart: unless-stopped

  normalizer:
    build:
      context: ../..
      dockerfile: components/normalizer/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      TEXTFSM_TEMPLATES_PATH: /app/templates/textfsm
      NORMALIZER_BATCH_SIZE: 50
      NORMALIZER_ERROR_THRESHOLD: 100
    restart: unless-stopped

  db_insert:
    build:
      context: ../..
      dockerfile: components/db_insert/Dockerfile
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      CACHE_TIMEOUT_MINUTES: 30
    restart: unless-stopped

  # ── Phase 3 — RAG Indexer ───────────────────────────────────────────────────

  rag_indexer:
    build:
      context: ../..
      dockerfile: components/rag_indexer/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      <<: *common-env
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: netfleet_device_output
      EMBEDDING_MODEL: all-MiniLM-L6-v2
      EMBEDDING_CHUNK_TOKENS: 512
      RAG_BATCH_SIZE: 20
    restart: unless-stopped

  # ── API ─────────────────────────────────────────────────────────────────────

  api:
    build:
      context: ../..
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      <<: *common-env
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: netfleet_device_output
      EMBEDDING_MODEL: all-MiniLM-L6-v2
      NL_QUERY_MAX_RESULTS: 50
      NL_QUERY_TIMEOUT_SECONDS: 30
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    restart: unless-stopped

  # ── Simulator ───────────────────────────────────────────────────────────────

  simulator:
    build:
      context: ../..
      dockerfile: simulator/Dockerfile
    ports:
      - "8888:8888"
    environment:
      SIMULATOR_HOST: 0.0.0.0
      SIMULATOR_PORT: 8888
      SIMULATOR_DEVICE_COUNT: 100
      LOG_LEVEL: INFO
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data:
  qdrant_data:
